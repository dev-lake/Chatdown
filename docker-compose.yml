services:
  api:
    build:
      context: ./server
    image: chatdown-api:latest
    restart: unless-stopped
    env_file:
      - ./server/.env
    environment:
      CHATDOWN_ENV: production
      DATABASE_PATH: /data/chatdown.sqlite3
    ports:
      - "127.0.0.1:5001:5001"
    volumes:
      - chatdown-data:/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:5001/health', timeout=5).read()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  chatdown-data:
